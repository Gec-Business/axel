name: Daily Backup
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Export Supabase data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p backups
          curl -s "${SUPABASE_URL}/rest/v1/posts?select=*&order=created_at.desc" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" > backups/posts.json
          curl -s "${SUPABASE_URL}/rest/v1/campaigns?select=*&order=created_at.desc" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" > backups/campaigns.json
          curl -s "${SUPABASE_URL}/rest/v1/audit_log?select=*&order=created_at.desc&limit=1000" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" > backups/audit_log.json
          echo "Backup completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - name: Commit backup
        run: |
          git config user.name "Backup Bot"
          git config user.email "noreply@axelnetwork.org"
          git add backups/
          git diff --cached --quiet || git commit -m "Daily backup $(date +%Y-%m-%d)"
          git push || echo "No changes to push"
