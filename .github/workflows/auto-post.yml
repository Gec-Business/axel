name: Auto-Post
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger auto-post
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.SITE_URL }}/api/cron/auto-post" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 540)
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          echo "HTTP Status: $http_code"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Auto-post failed with status $http_code"
            exit 1
          fi
